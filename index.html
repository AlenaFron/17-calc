<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator & ToDo</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .calc-container { margin-bottom: 30px; border-bottom: 1px solid #ccc; padding-bottom: 20px; }
    input { width: 60px; margin-right: 5px; }
    #result { font-weight: bold; margin-left: 10px; }
  </style>
</head>
<body>

  <!-- Интерфейс калькулятора -->
  <div class="calc-container">
    <h3>Простой калькулятор</h3>
    <input type="number" id="num1" placeholder="Число 1">
    <input type="number" id="num2" placeholder="Число 2">
    
    <button onclick="calculate('+')">+</button>
    <button onclick="calculate('-')">-</button>
    <button onclick="calculate('*')">*</button>
    <button onclick="calculate('/')">/</button>

    <span>Результат: <span id="result">0</span></span>
  </div>

  <h3>Результаты ToDo (в консоли)</h3>

  <!-- Подключаем JS -->
  <script src="app.js"></script>
</body>
</html>
